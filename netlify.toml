# Netlify Configuration for OneShop Storefront

[build]
  command = "npm run build"
  functions = ".netlify/functions"
  publish = "dist"

# Environment variables
[build.environment]
  ECOMCLIENT_NOTIMEOUT = "true"

# Rewrite rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
  conditions = { Not-Literal-Path = true }

# Asset caching headers
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app/*"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=60"

[[headers]]
  for = "/chunk*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/(storefront|checkout).js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/(storefront|checkout).css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=60, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=30, must-revalidate"
